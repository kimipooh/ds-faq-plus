name: wp-ds-faq-plus plugin test

on:
  push:
    branches:
      - master
      - main
    tags:
      - '*'
  pull_request:
    branches:
      - master
      - main

jobs:
  test:
    name: "PHP ${{ matrix.php }} - WP ${{ matrix.wp }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3', '8.4' ,'8.5']
        wp: ['latest']

    services:
      mysql:
        image: mariadb:10.11
        env:
          MARIADB_DATABASE: wordpress_test
          MARIADB_ROOT_PASSWORD: root
          MARIADB_ROOT_HOST: '%'
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -proot --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Subversion
        run: |
          sudo apt-get update
          sudo apt-get install -y subversion

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: mysqli
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Wait for DB
        run: |
          for i in {1..30}; do
            mysqladmin ping -h127.0.0.1 -uroot -proot --silent && exit 0
            sleep 2
          done
          echo "Database did not become ready in time"
          exit 1

      - name: Install WordPress test suite
        run: bash ./phpunit/install.sh wordpress_test root root 127.0.0.1:3306 ${{ matrix.wp }}

      - name: Show test library files
        run: |
          ls -la /tmp/wordpress-tests-lib || true
          ls -la /tmp/wordpress-tests-lib/includes || true

      - name: Run PHPUnit
        run: vendor/bin/phpunit -c phpunit.xml.dist